name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    name: Check & Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          components: clippy, rustfmt
      - name: Check formatting
        run: cargo fmt --all --check
      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings
      - name: Build
        run: cargo build --release

  test:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
      - name: Run tests
        run: cargo test --release

  build-linux:
    name: Build (Linux)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
      - name: Build release
        run: cargo build --release
      - name: Prepare artifacts
        run: |
          mkdir -p artifacts
          cp target/release/vlkxn-cli artifacts/
          cp target/release/vlkxn-controller artifacts/ 2>/dev/null || true
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: vlkxn-linux
          path: artifacts/

  build-windows:
    name: Build (Windows)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
      - name: Build release
        run: cargo build --release
      - name: Prepare artifacts
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path artifacts -Force
          Copy-Item target/release/vlkxn-cli.exe artifacts/
          Copy-Item target/release/vlkxn-controller.exe artifacts/ -ErrorAction SilentlyContinue
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: vlkxn-windows
          path: artifacts/
