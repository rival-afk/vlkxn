name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  create-release:
    name: Create Release
    runs-on: ubuntu-latest
    outputs:
      upload_url: ${{ steps.create_release.outputs.upload_url }}
    steps:
      - uses: actions/checkout@v4
      - name: Create Release
        id: create_release
        uses: softprops/action-gh-release@v2
        with:
          name: Vlkxn ${{ github.ref_name }}
          draft: true
          prerelease: true
          generate_release_notes: true
          files: |
            LICENSE
            README.md

  build-linux:
    name: Build Linux
    needs: create-release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
      - name: Build
        run: cargo build --release
      - name: Package
        run: |
          mkdir -p vlkxn-${{ github.ref_name }}-linux
          cp target/release/vlkxn-cli vlkxn-${{ github.ref_name }}-linux/
          cp target/release/vlkxn-controller vlkxn-${{ github.ref_name }}-linux/ 2>/dev/null || true
          cp README.md LICENSE vlkxn-${{ github.ref_name }}-linux/
          tar czf vlkxn-${{ github.ref_name }}-linux-x86_64.tar.gz vlkxn-${{ github.ref_name }}-linux/
      - name: Upload
        uses: softprops/action-gh-release@v2
        with:
          files: vlkxn-${{ github.ref_name }}-linux-x86_64.tar.gz

  build-windows:
    name: Build Windows
    needs: create-release
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
      - name: Build
        run: cargo build --release
      - name: Package
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path "vlkxn-${{ github.ref_name }}-windows"
          Copy-Item target/release/vlkxn-cli.exe "vlkxn-${{ github.ref_name }}-windows/"
          Copy-Item target/release/vlkxn-controller.exe "vlkxn-${{ github.ref_name }}-windows/" -ErrorAction SilentlyContinue
          Copy-Item README.md, LICENSE "vlkxn-${{ github.ref_name }}-windows/"
          Compress-Archive -Path "vlkxn-${{ github.ref_name }}-windows/*" -DestinationPath "vlkxn-${{ github.ref_name }}-windows-x86_64.zip"
      - name: Upload
        uses: softprops/action-gh-release@v2
        with:
          files: vlkxn-${{ github.ref_name }}-windows-x86_64.zip
