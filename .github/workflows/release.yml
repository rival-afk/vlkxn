name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            ext: ""
            asset_name: linux-x86_64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            ext: ".exe"
            asset_name: windows-x86_64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          target: ${{ matrix.target }}
      - name: Build
        run: cargo build --release --target ${{ matrix.target }}
      - name: Build .deb
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq dpkg-dev
          VERSION="${{ github.ref_name }}"
          VERSION="${VERSION#v}"
          PKG_ROOT="vlkxn_${VERSION}_amd64"
          mkdir -p "${PKG_ROOT}/DEBIAN"
          mkdir -p "${PKG_ROOT}/usr/bin"
          mkdir -p "${PKG_ROOT}/usr/share/applications"
          mkdir -p "${PKG_ROOT}/usr/share/icons/hicolor/scalable/apps"
          cat > "${PKG_ROOT}/DEBIAN/control" << 'CONTROL'
Package: vlkxn
Version: {{VERSION}}
Section: net
Priority: optional
Architecture: amd64
Maintainer: Vlkxn Contributors
Description: Decentralized P2P VPN for gaming
 Built with Rust + libp2p.
 Provides a virtual network adapter (TUN) for peer-to-peer
 gaming connections with automatic peer discovery.
CONTROL
          sed -i "s/{{VERSION}}/$VERSION/" "${PKG_ROOT}/DEBIAN/control"
          cp "target/${{ matrix.target }}/release/vlkxn-cli" "${PKG_ROOT}/usr/bin/"
          cp "target/${{ matrix.target }}/release/vlkxn-gui" "${PKG_ROOT}/usr/bin/" 2>/dev/null || true
          cat > "${PKG_ROOT}/usr/share/applications/vlkxn.desktop" << 'DESKTOP'
[Desktop Entry]
Name=Vlkxn
Comment=Decentralized P2P VPN for Gaming
Exec=/usr/bin/vlkxn-gui
Icon=vlkxn
Terminal=false
Type=Application
Categories=Network;Game;
DESKTOP
          if [ -f scripts/vlkxn-icon.svg ]; then
            cp scripts/vlkxn-icon.svg "${PKG_ROOT}/usr/share/icons/hicolor/scalable/apps/"
          fi
          cat > "${PKG_ROOT}/DEBIAN/postinst" << 'POSTINST'
#!/bin/sh
set -e
if command -v setcap >/dev/null 2>&1; then
  setcap cap_net_admin+ep /usr/bin/vlkxn-cli 2>/dev/null || true
  setcap cap_net_admin+ep /usr/bin/vlkxn-gui 2>/dev/null || true
fi
update-desktop-database /usr/share/applications 2>/dev/null || true
exit 0
POSTINST
          chmod 755 "${PKG_ROOT}/DEBIAN/postinst"
          dpkg-deb --build "${PKG_ROOT}"
          mv "vlkxn_${VERSION}_amd64.deb" "vlkxn-${{ github.ref_name }}-${{ matrix.asset_name }}.deb"
          echo "DEB=vlkxn-${{ github.ref_name }}-${{ matrix.asset_name }}.deb" >> $GITHUB_ENV
      - name: Package (Unix)
        if: matrix.os != 'windows-latest'
        run: |
          mkdir -p vlkxn-${{ github.ref_name }}
          cp target/${{ matrix.target }}/release/vlkxn-cli${{ matrix.ext }} vlkxn-${{ github.ref_name }}/
          cp target/${{ matrix.target }}/release/vlkxn-gui${{ matrix.ext }} vlkxn-${{ github.ref_name }}/ 2>/dev/null || true
          cp README.md LICENSE vlkxn-${{ github.ref_name }}/
          cp scripts/install.sh vlkxn-${{ github.ref_name }}/ 2>/dev/null || true
          tar czf vlkxn-${{ github.ref_name }}-${{ matrix.asset_name }}.tar.gz vlkxn-${{ github.ref_name }}/
          echo "ARCHIVE=vlkxn-${{ github.ref_name }}-${{ matrix.asset_name }}.tar.gz" >> $GITHUB_ENV
      - name: Package (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path "vlkxn-${{ github.ref_name }}" -Force
          Copy-Item "target/${{ matrix.target }}/release/vlkxn-cli${{ matrix.ext }}" "vlkxn-${{ github.ref_name }}/"
          Copy-Item "target/${{ matrix.target }}/release/vlkxn-gui${{ matrix.ext }}" "vlkxn-${{ github.ref_name }}/" -ErrorAction SilentlyContinue
          Copy-Item README.md, LICENSE "vlkxn-${{ github.ref_name }}/"
          Copy-Item "scripts/install.ps1", "scripts/install.bat" "vlkxn-${{ github.ref_name }}/" -ErrorAction SilentlyContinue
          Compress-Archive -Path "vlkxn-${{ github.ref_name }}/*" -DestinationPath "vlkxn-${{ github.ref_name }}-${{ matrix.asset_name }}.zip"
          echo "ARCHIVE=vlkxn-${{ github.ref_name }}-${{ matrix.asset_name }}.zip" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
      - name: Upload Release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          prerelease: true
          generate_release_notes: true
          files: |
            ${{ env.ARCHIVE }}
            ${{ env.DEB }}
            LICENSE
            README.md
